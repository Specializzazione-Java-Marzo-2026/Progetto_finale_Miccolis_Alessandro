<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrazione - Aulab Chronicle</title>
</head>
<body>
<h1>Registrazione</h1>

<div th:if="${successMessage}">
    <p th:text="${successMessage}"></p>
</div>
<div th:if="${registrationError}">
    <p th:text="${registrationError}"></p>
</div>

<form th:action="@{/register}" th:object="${registerDTO}" method="post">
    <div>
        <label>Username</label>
        <input type="text" th:field="*{username}" />
        <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
    </div>
    <div>
        <label>Email</label>
        <input type="email" th:field="*{email}" />
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
    </div>
    <div>
        <label>Password</label>
        <input type="password" th:field="*{password}" />
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
    </div>
    <button type="submit">Registrati</button>
</form>

<p><a th:href="@{/login}">Vai al login</a></p>
<p><a th:href="@{/home}">Torna alla home</a></p>
</body>
</html>
