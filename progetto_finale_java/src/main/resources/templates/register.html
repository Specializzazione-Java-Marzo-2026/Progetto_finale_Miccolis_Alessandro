<!DOCTYPE html>

<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - Aulab Chronicle</title>
    <style>
        * {
            box-sizing: border-box;
        }


    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #2563eb, #1e3a8a);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    a {
        text-decoration: none;
        color: inherit;
    }

    .navbar {
        background-color: #111827;
        color: white;
        padding: 16px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
    }

    .nav-left,
    .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .brand {
        font-size: 26px;
        font-weight: bold;
        color: white;
    }

    .nav-link {
        background-color: #374151;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 14px;
        transition: 0.2s;
    }

    .nav-link:hover {
        background-color: #4b5563;
    }

    .page-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .register-card {
        width: 100%;
        max-width: 460px;
        background-color: white;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        padding: 32px;
    }

    .register-card h1 {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 30px;
        color: #111827;
    }

    .register-card p {
        margin-top: 0;
        margin-bottom: 24px;
        color: #555;
        line-height: 1.5;
    }

    .message {
        padding: 14px 16px;
        border-radius: 8px;
        margin-bottom: 18px;
        font-size: 14px;
    }

    .message-success {
        background-color: #dcfce7;
        color: #166534;
        border: 1px solid #86efac;
    }

    .message-error {
        background-color: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #111827;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .btn-register {
        width: 100%;
        border: none;
        background-color: #2563eb;
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn-register:hover {
        background-color: #1d4ed8;
    }

    .bottom-links {
        margin-top: 22px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        font-size: 14px;
    }

    .bottom-links a {
        color: #2563eb;
        font-weight: 600;
    }

    .bottom-links a:hover {
        text-decoration: underline;
    }

    .footer {
        background-color: #111827;
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 14px;
    }
</style>


</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a th:href="@{/home}" class="brand">Aulab Chronicle</a>
        <a th:href="@{/home}" class="nav-link">Home</a>
        <a th:href="@{/login}" class="nav-link">Login</a>
    </div>


<div class="nav-right">
    <a th:href="@{/home}" class="nav-link">Torna al sito</a>
</div>


</nav>

<div class="page-wrapper">
    <div class="register-card">
        <h1>Registrati</h1>
        <p>Crea il tuo account per accedere alla piattaforma.</p>


    <div th:if="${successMessage}" class="message message-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="message message-error" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Inserisci il tuo username" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Inserisci la tua password" required>
        </div>

        <button type="submit" class="btn-register">Registrati</button>
    </form>

    <div class="bottom-links">
        <a th:href="@{/login}">Hai già un account? Accedi</a>
        <a th:href="@{/home}">Torna alla home</a>
    </div>
</div>


</div>

<footer class="footer">
    © Aulab Chronicle - Progetto finale Java
</footer>

</body>
</html>
