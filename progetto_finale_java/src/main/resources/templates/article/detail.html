<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.title} + ' - Aulab Chronicle'">Dettaglio articolo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            color: #222;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .navbar {
            background-color: #111827;
            color: white;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-left,
        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            font-size: 26px;
            font-weight: bold;
            color: white;
        }

        .nav-link {
            background-color: #374151;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-link:hover {
            background-color: #4b5563;
        }

        .page-wrapper {
            width: 92%;
            max-width: 1000px;
            margin: 35px auto 50px auto;
        }

        .article-card {
            background-color: white;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .article-image {
            width: 100%;
            max-height: 420px;
            object-fit: cover;
            background-color: #e5e7eb;
            display: block;
        }

        .image-placeholder {
            width: 100%;
            height: 320px;
            background-color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-weight: bold;
            font-size: 18px;
        }

        .article-content {
            padding: 32px;
        }

        .badge {
            display: inline-block;
            width: fit-content;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #dbeafe;
            color: #1d4ed8;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .article-title {
            margin: 0 0 12px 0;
            font-size: 36px;
            line-height: 1.2;
            color: #111827;
        }

        .article-subtitle {
            margin: 0 0 18px 0;
            font-size: 20px;
            color: #4b5563;
            line-height: 1.5;
        }

        .article-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 15px;
            color: #555;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid #e5e7eb;
        }

        .article-meta a {
            color: #2563eb;
            font-weight: 600;
        }

        .article-body {
            font-size: 17px;
            line-height: 1.8;
            color: #222;
            white-space: pre-line;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-secondary {
            background-color: #e5e7eb;
            color: #111827;
        }

        .btn-secondary:hover {
            background-color: #d1d5db;
        }

        .footer {
            background-color: #111827;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .article-content {
                padding: 22px;
            }

            .article-title {
                font-size: 28px;
            }

            .article-subtitle {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a th:href="@{/home}" class="brand">Aulab Chronicle</a>
        <a th:href="@{/home}" class="nav-link">Home</a>
    </div>

    <div class="nav-right">
        <a th:href="@{/home}" class="nav-link">Torna agli articoli</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="article-card">
        <img th:if="${article.image != null}" th:src="${article.image.path}" alt="Immagine articolo" class="article-image">

        <div th:if="${article.image == null}" class="image-placeholder">
            Nessuna immagine disponibile
        </div>

        <div class="article-content">
            <a th:href="@{/category/{id}(id=${article.category.id})}" class="badge" th:text="${article.category.name}">Categoria</a>

            <h1 class="article-title" th:text="${article.title}">Titolo articolo</h1>

            <p class="article-subtitle" th:text="${article.subtitle}">Sottotitolo articolo</p>

            <div class="article-meta">
                <span>
                    Autore:
                    <a th:href="@{/author/{id}(id=${article.user.id})}" th:text="${article.user.username}">Autore</a>
                </span>
                <span th:text="'Pubblicato il: ' + ${#temporals.format(article.createdAt, 'dd/MM/yyyy HH:mm')}">Data pubblicazione</span>
            </div>

            <div class="article-body" th:text="${article.body}">
                Testo articolo
            </div>

            <div class="actions">
                <a th:href="@{/category/{id}(id=${article.category.id})}" class="btn btn-secondary">Altri della categoria</a>
                <a th:href="@{/author/{id}(id=${article.user.id})}" class="btn btn-primary">Altri articoli dell'autore</a>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    © Aulab Chronicle - Progetto finale Java
</footer>

</body>
</html>
